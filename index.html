<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BigCalcs · DNF 伤害计算器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base: "#070b12",
            panel: "#101722",
            panel2: "#151f2d",
            line: "#26344a",
            cyanx: "#20d9ff",
            greenx: "#5df2a2",
            goldx: "#f6c960",
            redx: "#ff6685"
          },
          boxShadow: {
            glow: "0 0 34px rgba(32,217,255,.18)",
            soft: "0 18px 60px rgba(0,0,0,.35)"
          }
        }
      }
    };
  </script>
</head>

<body class="min-h-screen bg-base text-slate-100 antialiased">
  <main
    class="min-h-screen bg-[radial-gradient(circle_at_18%_0%,rgba(32,217,255,.14),transparent_28%),linear-gradient(145deg,#070b12_0%,#0a111b_46%,#111525_100%)]">
    <div class="mx-auto flex min-h-screen w-full max-w-[1500px] flex-col px-4 py-4 sm:px-6 lg:px-8">

      <!-- ==================== Header ==================== -->
      <header class="flex items-center justify-between border-b border-line pb-4">
        <div class="flex items-center gap-4">
          <div class="grid h-12 w-12 place-items-center rounded-lg border border-cyanx/40 bg-cyanx/10 shadow-glow">
            <i data-lucide="calculator" class="h-6 w-6 text-cyanx"></i>
          </div>
          <div>
            <h1 class="text-2xl font-semibold tracking-[0] text-white sm:text-3xl">BigCalcs</h1>
            <p class="mt-1 text-sm text-slate-400">DNF 115 版本 · 伤害计算器</p>
          </div>
        </div>
      </header>

      <!-- ==================== Tab Navigation ==================== -->
      <nav class="mt-4 flex gap-1 rounded-lg border border-line bg-panel/90 p-1.5">
        <button data-tab="ranking"
          class="tab-btn flex items-center gap-2 rounded-md px-5 py-2.5 text-sm font-medium text-slate-300 hover:text-white active">
          <i data-lucide="bar-chart-3" class="h-4 w-4"></i>方案排行
        </button>
        <button data-tab="character"
          class="tab-btn flex items-center gap-2 rounded-md px-5 py-2.5 text-sm font-medium text-slate-300 hover:text-white">
          <i data-lucide="user" class="h-4 w-4"></i>角色预设
        </button>
        <button data-tab="condition"
          class="tab-btn flex items-center gap-2 rounded-md px-5 py-2.5 text-sm font-medium text-slate-300 hover:text-white">
          <i data-lucide="sliders-horizontal" class="h-4 w-4"></i>条件预设
        </button>
        <button data-tab="equipment"
          class="tab-btn flex items-center gap-2 rounded-md px-5 py-2.5 text-sm font-medium text-slate-300 hover:text-white">
          <i data-lucide="database" class="h-4 w-4"></i>基础装备库
        </button>
      </nav>

      <!-- ==================== Tab Content Panels ==================== -->
      <section id="tab-ranking" class="tab-panel mt-4">
        <div class="rounded-lg border border-line bg-panel/80 p-8 text-center">
          <i data-lucide="bar-chart-3" class="mx-auto h-10 w-10 text-cyanx/50"></i>
          <p class="mt-3 text-slate-400">方案排行 — 对比方案结果将在此展示</p>
        </div>
      </section>

      <section id="tab-character" class="tab-panel mt-4 hidden">
        <div class="rounded-lg border border-line bg-panel/80 p-8 text-center">
          <i data-lucide="user" class="mx-auto h-10 w-10 text-greenx/50"></i>
          <p class="mt-3 text-slate-400">角色预设 — 角色面板与职业模板配置</p>
        </div>
      </section>

      <section id="tab-condition" class="tab-panel mt-4 hidden">
        <div class="rounded-lg border border-line bg-panel/80 p-8 text-center">
          <i data-lucide="sliders-horizontal" class="mx-auto h-10 w-10 text-goldx/50"></i>
          <p class="mt-3 text-slate-400">条件预设 — 装备套装、支援 buff 等默认假设</p>
        </div>
      </section>

      <section id="tab-equipment" class="tab-panel mt-4 hidden">
        <div class="rounded-lg border border-line bg-panel/80 p-8 text-center">
          <i data-lucide="database" class="mx-auto h-10 w-10 text-redx/50"></i>
          <p class="mt-3 text-slate-400">基础装备库 — 版本装备数据管理</p>
        </div>
      </section>

      <!-- ==================== Footer ==================== -->
      <footer class="mt-auto border-t border-line pt-4 pb-2 text-center text-xs text-slate-600">
        BigCalcs · DNF 115 Damage Calculator · 基于 AGENTS.md 规范构建
      </footer>

    </div>
  </main>

  <!-- ==================== Tab Switch Logic ==================== -->
  <script>
    (function () {
      const tabs = document.querySelectorAll(".tab-btn");
      const panels = document.querySelectorAll(".tab-panel");

      function activateTab(target) {
        // Update button states
        tabs.forEach(btn => {
          const isActive = btn.dataset.tab === target;
          btn.classList.toggle("bg-cyanx/15", isActive);
          btn.classList.toggle("text-cyanx", isActive);
          btn.classList.toggle("text-slate-300", !isActive);
        });
        // Toggle panels
        panels.forEach(panel => {
          panel.classList.toggle("hidden", panel.id !== "tab-" + target);
        });
      }

      tabs.forEach(btn => {
        btn.addEventListener("click", () => activateTab(btn.dataset.tab));
      });

      // Initial render
      lucide.createIcons();
    })();
  </script>

</body>
</html>
